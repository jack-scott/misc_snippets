[develop]
script_dir=$base/lib/cadvisor_monitor

[install]
install_scripts=$base/lib/cadvisor_monitor

[tool:pytest]
testpaths = tests
; ros-humble-launch-testing and ros-humble-launch-testing-ros both register
; pytest11 plugins (entry point names "launch_testing" and "launch_ros")
; built against an older pytest hookspec that current pytest no longer
; provides, so pytest refuses to start at all while they're installed unless
; disabled here. Launch tests (launch_tests/) are run directly via the
; `launch_test` CLI instead, which doesn't go through pytest.
addopts = -p no:launch_testing -p no:launch_ros
