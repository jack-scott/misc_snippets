services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    ports:
      - "${CADVISOR_PORT:-8080}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  cadvisor_monitor:
    build:
      context: .
      target: prod
      args:
        DIAGNOSTICS_ANALYZERS: "${DIAGNOSTICS_ANALYZERS}"
    image: cadvisor_prod:prod
    depends_on:
      - cadvisor
    environment:
      # 0, not 1: diagnostic_aggregator runs in its own container (see
      # compose.diagnostics.yaml) and needs DDS discovery across containers
      # on the compose network to see this node's /diagnostics.
      - ROS_LOCALHOST_ONLY=0
    command: [ros2, run, cadvisor_monitor, container_stats_publisher, --ros-args, -p, cadvisor_url:=http://cadvisor:8080]