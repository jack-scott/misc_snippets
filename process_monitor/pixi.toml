[workspace]
channels = [
    "https://prefix.dev/jacks-channel",  # ← YOUR CHANNEL FIRST
    "https://prefix.dev/robostack-humble",
    "https://prefix.dev/conda-forge",
]
platforms = ["linux-64"]
preview = ["pixi-build"]

[dependencies]
python = ">=3.10"

[feature.build.dependencies]
colcon-common-extensions = "*"

[feature.development.dependencies]
ros-humble-ros2topic = "*"

[feature.test.dependencies]
colcon-common-extensions = "*"

[feature.runtime.dependencies]
ros-humble-ros2run = "*"

[feature.ci.dependencies]
curl = "*"
goss = "*"

[feature.deploy.dependencies]
# ---- Comment out either the local or remote to switch between trying the different sources ----
# DEVELOPMENT: Use local source for active changes
ros-humble-cadvisor-monitor = { path = "src/cadvisor_monitor" }
# DEPLOYEMENT: Use this upstream version after you have published the package (refer to README)
# ros-humble-cadvisor-monitor = "0.1.*"

[dev]
ros-humble-cadvisor-monitor = { path = "src/cadvisor_monitor" }

[tasks]
# Standalone CLI tool (no ROS needed for display)
monitor = "python scripts/top_cpu_usage.py"
monitor-all = "python scripts/top_cpu_usage.py -a"

# ROS 2 node
ros-run = { cmd = "ros2 run cadvisor_monitor container_stats_publisher --ros-args -p cadvisor_url:=http://$CADVISOR_HOST:$CADVISOR_PORT"}
ros-topics = "ros2 topic list"
ros-echo-cpu = "ros2 topic echo /container_stats/cpu"
ros-echo-mem = "ros2 topic echo /container_stats/memory"

# PUBLISH WORKFLOW
publish = """
    cd src/cadvisor_monitor && \
    pixi build && \
    pixi upload prefix --channel jacks-channel --api-key $PREFIX_AUTH *.conda
"""
[feature.ci.activation]
env = { GOSS_FILES_PATH = "goss/cadvisor_monitor",
        COMPOSE_FILE="compose.yaml",
        GOSS_SLEEP="5", 
        GOSS_WAIT_OPTS='-r 30s -s 1s', 
        GOSS_OPTS='--format documentation' 
        }
[feature.ci.tasks]
# Compose-based smoketest: brings up the full stack from compose.yaml
# (docker-compose.yaml symlinks to it) — cadvisor plus the cadvisor_monitor
# node depending on it — and runs the same goss checks against the node
# once it's live, with the node actually reaching a real cadvisor.
smoketest-compose = { cmd = """
    dcgoss run cadvisor_monitor
"""}

[environments]
default ={ features = ["test", "build", "runtime", "development"], solve-group = "main"}
prod = {features = ["deploy", "runtime"], solve-group = "main"}
ci = { features = ["ci"], solve-group = "main"}