[workspace]
channels = [
    "https://prefix.dev/jacks-channel",  # ← YOUR CHANNEL FIRST
    "https://prefix.dev/robostack-humble",
    "https://prefix.dev/conda-forge",
]
platforms = ["linux-64"]
preview = ["pixi-build"]

[dependencies]
python = ">=3.10"

[feature.build.dependencies]
colcon-common-extensions = "*"

[feature.development.dependencies]
ros-humble-ros2topic = "*"

[feature.test.dependencies]
colcon-common-extensions = "*"

[feature.runtime.dependencies]
ros-humble-ros2run = "*"
ros-humble-diagnostic-aggregator = "*"
# ros-humble-diagnostic-aggregator's own conda metadata is missing these two
# transitive runtime deps of its compiled aggregator_node (upstream robostack
# packaging gap) — pinned explicitly so aggregator_node can actually start,
# both here (dev/test) and in the deployed prod image.
ros-humble-class-loader = "*"
console_bridge = "*"

[feature.ci.dependencies]
curl = "*"
goss = "*"
container-structure-test = "*"

[feature.deploy.dependencies]
# ---- Comment out either the local or remote to switch between trying the different sources ----
# DEVELOPMENT: Use local source for active changes
ros-humble-cadvisor-monitor = { path = "src/cadvisor_monitor" }
# DEPLOYEMENT: Use this upstream version after you have published the package (refer to README)
# ros-humble-cadvisor-monitor = "0.1.*"

[dev]
ros-humble-cadvisor-monitor = { path = "src/cadvisor_monitor" }

[tasks]
# Standalone CLI tool (no ROS needed for display)
monitor = "python scripts/top_cpu_usage.py"
monitor-all = "python scripts/top_cpu_usage.py -a"

# ROS 2 node
ros-run = { cmd = "ros2 run cadvisor_monitor container_stats_publisher --ros-args -p cadvisor_url:=http://$CADVISOR_HOST:$CADVISOR_PORT"}
ros-topics = "ros2 topic list"
ros-echo-cpu = "ros2 topic echo /container_stats/cpu"
ros-echo-mem = "ros2 topic echo /container_stats/memory"

# PUBLISH WORKFLOW
publish = """
    cd src/cadvisor_monitor && \
    pixi build && \
    pixi upload prefix --channel jacks-channel --api-key $PREFIX_AUTH *.conda
"""
[feature.ci.activation.env]
GOSS_FILES_PATH = "ci/goss/cadvisor_monitor"
COMPOSE_FILE = "compose.yaml"
GOSS_SLEEP = "5"
GOSS_WAIT_OPTS = '-r 30s -s 1s'
GOSS_OPTS = '--format documentation'
[feature.test.tasks]
build-test-ws = "colcon build --packages-select cadvisor_monitor"
# Regular unit tests (tests/) via pytest.
unit-test = { cmd = "bash -c 'source install/setup.bash && cd src/cadvisor_monitor && python3 -m pytest tests/ -v'", depends-on = [
    "build-test-ws",
] }
# Integration test (launch_tests/) via the launch_test CLI, not pytest —
# ros-humble-launch-testing's pytest plugin is incompatible with current
# pytest (see setup.cfg), so this must run outside of it.
integration-test = { cmd = "bash -c 'source install/setup.bash && launch_test src/cadvisor_monitor/launch_tests/test_diagnostics_integration.py'", depends-on = [
    "build-test-ws",
] }

[feature.ci.tasks]
# Compose-based smoketest: brings up the full stack from compose.yaml
# (docker-compose.yaml symlinks to it) — cadvisor plus the cadvisor_monitor
# node depending on it — and runs the same goss checks against the node
# once it's live, with the node actually reaching a real cadvisor.
smoketest-compose = { cmd = """
    dcgoss run cadvisor_monitor
"""}

# Two-stage label check on the built prod image (build first with
# `bash docker/build.sh`):
#   1. container-structure-test asserts every expected io.ros.pkg label key
#      is present and non-default (isRegex ".+" — rejects the Dockerfile
#      ARG's empty-string default, e.g. an unset params build arg).
#   2. Only once that passes: `contents decode` each field, which is where a
#      present-and-non-empty-but-still-malformed value would fail —
#      metadataTest can assert a label's raw string but can't shell out to
#      actually decode/validate it.
container-structure-check = "container-structure-test test --image cadvisor_prod:latest --config ci/container-structure-test.yaml"
container-decode-check = { cmd = "bash -c 'set -e; for field in cmd diagnostics params; do contents decode --pkg cadvisor_monitor --field \"$field\" cadvisor_prod:latest > /dev/null && echo \"cadvisor_monitor/$field: OK\"; done'", depends-on = [
    "container-structure-check",
] }
container-check = { depends-on = ["container-decode-check"] }

[environments]
default ={ features = ["test", "build", "runtime", "development"], solve-group = "main"}
prod = {features = ["deploy", "runtime"], solve-group = "main"}
ci = { features = ["ci"], solve-group = "main"}