# Control plane — telemetry backhaul and recording
#
# Bring this up before drone stacks. It creates the manet_control network
# that radios and the UI both attach to.
#
# Usage:
#   DRONE_COUNT=3 docker compose -f control_plane/compose.yml -p manet_control up -d

services:
  foxglove_logger:
    build:
      context: ./foxglove_logger
    container_name: manet_foxglove
    stop_grace_period: 2s
    ports:
      - "8765:8765"   # WebSocket — connect Foxglove Studio here
      - "9090:9090"   # HTTP ingest — drone apps POST /log here
    environment:
      - DRONE_COUNT=${DRONE_COUNT:-3}
      - RECORD_MCAP=${RECORD_MCAP:-false}
    volumes:
      - manet_metrics:/metrics:ro
      - manet_recordings:/recordings
    networks:
      - control

networks:
  control:
    name: manet_control   # created here; referenced as external by radio and ui

volumes:
  manet_metrics:
    name: manet_metrics
    external: true        # created by launch.py before anything else starts
  manet_recordings:
    name: manet_recordings
