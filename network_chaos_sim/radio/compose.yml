# Radio node — used for every drone and the base station (DRONE_ID=0)
#
# Never run this file directly. Use launch.py which sets DRONE_ID and DRONE_COUNT,
# then overlays your experiment compose file on top.
#
# Example (handled by launch.py):
#   DRONE_ID=1 DRONE_COUNT=3 docker compose \
#     -f radio/compose.yml \
#     -f experiments/my_algo/compose.yml \
#     -p drone1 up -d

services:
  radio:
    build:
      context: .
    container_name: drone${DRONE_ID}_radio
    hostname: drone${DRONE_ID}_radio
    stop_grace_period: 2s
    cap_add:
      - NET_ADMIN
    environment:
      - DRONE_ID=${DRONE_ID}
      - DRONE_COUNT=${DRONE_COUNT}
    volumes:
      - manet_metrics:/metrics
      - ../config.yaml:/config/config.yaml:ro
    networks:
      manet:
        ipv4_address: 172.31.0.1${DRONE_ID}
      control:

networks:
  manet:
    name: manet_mesh
    external: true
  control:
    name: manet_control
    external: true

volumes:
  manet_metrics:
    name: manet_metrics
    external: true
