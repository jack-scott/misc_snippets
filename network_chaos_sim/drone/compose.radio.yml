# Radio Infrastructure - DO NOT MODIFY
#
# This provides the MANET radio interface for your drone.
# Your drone software goes in compose.app.yml
# Configure radio settings in ../config.yaml

services:
  radio:
    build:
      context: ../radio
    container_name: drone${DRONE_ID}_radio
    hostname: drone${DRONE_ID}_radio
    cap_add:
      - NET_ADMIN
    environment:
      - DRONE_ID=${DRONE_ID}
      - DRONE_COUNT=${DRONE_COUNT}
    volumes:
      - manet_metrics:/metrics
      - ../config.yaml:/config/config.yaml:ro
    networks:
      manet:
        ipv4_address: 172.31.0.1${DRONE_ID}
      control:
      internal:
        ipv4_address: 10.${DRONE_ID}.0.2

networks:
  manet:
    name: manet_mesh
    external: true

  control:
    name: manet_control
    external: true

  internal:
    name: drone${DRONE_ID}_internal
    driver: bridge
    ipam:
      config:
        - subnet: 10.${DRONE_ID}.0.0/16
          gateway: 10.${DRONE_ID}.0.1

volumes:
  manet_metrics:
    name: manet_metrics
    external: true
