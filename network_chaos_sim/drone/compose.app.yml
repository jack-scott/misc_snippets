# Drone Software - CUSTOMIZE THIS FILE
#
# The flight_controller service runs in the radio's network namespace so it has
# direct access to:
#   - MANET interface (172.31.0.1X)  — inter-drone Zenoh, goes through tc/netem
#   - localhost                       — intra-drone Zenoh, unrestricted
#   - control network                 — backhaul to foxglove_logger, unrestricted
#
# Command server on :8090 receives commands forwarded by foxglove_logger.
# Zenoh inter-drone on tcp/172.31.0.1X:7447 (MANET, degraded).
# Zenoh intra-drone on tcp/127.0.0.1:7448 (localhost, unrestricted).

services:
  flight_controller:
    build:
      context: ./fc
    container_name: drone${DRONE_ID}_fc
    stop_grace_period: 2s
    network_mode: "service:radio"
    environment:
      - DRONE_ID=${DRONE_ID}
      - DRONE_COUNT=${DRONE_COUNT}
      - FOXGLOVE_LOGGER_URL=http://foxglove_logger:9090
    volumes:
      - ../config.yaml:/config/config.yaml:ro
    depends_on:
      - radio
