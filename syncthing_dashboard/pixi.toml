[workspace]
name = "fleet-sync-dashboard"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
nodejs = ">=20"
python = ">=3.11"
pip = "*"

[pypi-dependencies]
requests = "*"
fastapi = ">=0.111"
uvicorn = { version = ">=0.29", extras = ["standard"] }
httpx = ">=0.27"
pydantic-settings = ">=2.2"

[tasks]
install = { cmd = "npm install", cwd = "web" }
dev = { cmd = "npm run dev", cwd = "web", depends-on = ["install"] }
build = { cmd = "npm run build", cwd = "web", depends-on = ["install"] }
api = { cmd = "uvicorn backend.main:app --reload --port 8000" }
init-drones = { cmd = "python tools/init_drones.py" }
