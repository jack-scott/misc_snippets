[workspace]
name = "fleet-sync-dashboard"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
nodejs = ">=20"
python = ">=3.11"
pip = "*"

[pypi-dependencies]
requests = "*"

[tasks]
install = "npm install"
dev = { cmd = "npm run dev", depends-on = ["install"] }
build = { cmd = "npm run build", depends-on = ["install"] }
init-drones = "python ../tools/init_drones.py"
